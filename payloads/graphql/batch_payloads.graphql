# payloads/graphql/batch_payloads.graphql
# Phase 12: GraphQL Batch Abuse Payload Templates
#
# These payloads demonstrate both forms of GraphQL batch abuse.
# Replace <TARGET_MUTATION>, <EMAIL_FIELD>, <PASSWORD_FIELD>
# with values discovered from introspection (Phase 5).
#
# Lab: DVGA - docker pull dolevf/dvga
# ================================================================


# ================================================================
# SECTION 1 — ARRAY BATCH PAYLOAD
# ================================================================
# Send as the HTTP request body (JSON array).
# This tests whether the server accepts multiple operations
# in a single POST request.
#
# HTTP Request format:
#   POST /graphql HTTP/1.1
#   Content-Type: application/json
#
#   [
#     {"query": "{ __typename }"},
#     {"query": "{ __typename }"},
#     ... (repeat N times)
#   ]
#
# Vulnerable response: A JSON array with N response objects.
# Protected response: HTTP 400 or error about batch not supported.
# ================================================================

# ARRAY_BATCH_PROBE (harmless — uses __typename)
# Use this first to confirm array batching is supported
# without needing credentials or a known mutation.
#
# JSON payload (Python: json.dumps([{"query": q}] * 10)):
# [
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"},
#   {"query": "{ __typename }"}
# ]


# ================================================================
# SECTION 2 — ALIAS BATCH PAYLOAD (Generic — No Auth Required)
# ================================================================
# This sends BATCH_SIZE aliases for the same field in one document.
# Used to confirm alias batching is supported when no login
# mutation is available from the schema.
# ================================================================

query GenericAliasBatch {
  alias0: __typename
  alias1: __typename
  alias2: __typename
  alias3: __typename
  alias4: __typename
  alias5: __typename
  alias6: __typename
  alias7: __typename
  alias8: __typename
  alias9: __typename
}


