# DVGA EXAMPLE — createPaste mutation (available without auth on DVGA):
# Tests that DVGA processes all aliases, proving the technique works.
mutation DVGAAliasBatchProof {
  attempt0: createPaste(title: "aegis_test_0", content: "probe", public: true) { paste { id } }
  attempt1: createPaste(title: "aegis_test_1", content: "probe", public: true) { paste { id } }
  attempt2: createPaste(title: "aegis_test_2", content: "probe", public: true) { paste { id } }
  attempt3: createPaste(title: "aegis_test_3", content: "probe", public: true) { paste { id } }
  attempt4: createPaste(title: "aegis_test_4", content: "probe", public: true) { paste { id } }
}


